name: Release

on:
  push:
    tags:
      - 'v*'

# electron-builder + the finalize step CREATE and EDIT GitHub releases, which
# needs contents:write on the GITHUB_TOKEN. Without this the token is read-only
# and electron-builder 403s ("Resource not accessible by integration").
permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build & Release macOS
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac -- --publish always

      - name: Build & Release Windows
        if: matrix.os == 'windows-latest'
        env:
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always

      - name: Build & Release Linux
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux -- --publish always

  finalize:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release notes from changelog + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_URL="https://www.urent-rental.de/api/fleet-os/changelog/${VERSION}"
          # The webapp is the single source of truth for changelog copy. Pull
          # the markdown for this version and use it as the release body — that
          # body is what electron-updater surfaces as releaseNotes in-app.
          if curl -fsSL "$NOTES_URL" -o release-notes.md; then
            gh release edit "${GITHUB_REF_NAME}" --notes-file release-notes.md --draft=false --repo="${GITHUB_REPOSITORY}"
          else
            echo "No changelog entry for ${VERSION}; publishing without notes."
            gh release edit "${GITHUB_REF_NAME}" --draft=false --repo="${GITHUB_REPOSITORY}"
          fi
